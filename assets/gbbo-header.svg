<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">Great British Bake Off Tipping Competition</title>
  <desc id="desc">Decorative header logo for the Bake Off tipping competition.</desc>
  <defs>
    <linearGradient id="cream" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf1"/>
      <stop offset="1" stop-color="#ffe7c6"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c76a42"/>
      <stop offset="1" stop-color="#8f3f24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#532e17" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="455" y="30" width="690" height="300" rx="54" fill="url(#cream)" stroke="#b85c38" stroke-width="5" opacity="0.95"/>
    <path d="M510 115 C620 85 685 86 760 116" fill="none" stroke="#c79335" stroke-width="6" stroke-linecap="round"/>
    <path d="M840 116 C915 86 980 85 1090 115" fill="none" stroke="#c79335" stroke-width="6" stroke-linecap="round"/>
    <text x="800" y="112" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-style="italic" fill="#1f2a3a" stroke="#fff8ec" stroke-width="3" paint-order="stroke">Great British</text>
    <text x="800" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="138" font-weight="700" fill="url(#red)" stroke="#fff0ce" stroke-width="5" paint-order="stroke">Bake Off</text>
    <path d="M560 265 C675 292 925 292 1040 265 L1015 318 C895 332 705 332 585 318 Z" fill="#fff4dd" stroke="#b85c38" stroke-width="4"/>
    <text x="800" y="307" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-style="italic" fill="#1f2a3a">Tipping Competition</text>
  </g>
</svg>
